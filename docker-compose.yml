services:

  mysql:

    image: mysql:8

    container_name: apnasathmysql-container

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: apnasath_db

    ports:
      - "3308:3308"

    volumes:
      - mysql_data:/var/lib/mysql

  app:

    build: .

    container_name: newapnasath-app

    ports:
      - "8070:8070"

    depends_on:
      - mysql

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/apnasath_db
      SPRING_DATASOURCE_USERNAME: root
      
      SPRING_DATASOURCE_PASSWORD: root123

volumes:
  mysql_data: