<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Registration Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .code-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        .code-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        .code-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Society Registration</h1>
        <p class="subtitle">Register your society to get started</p>
        
        <form id="societyForm">
            <div class="form-group">
                <label for="name">Society Name *</label>
                <input type="text" id="name" required placeholder="e.g., Green Valley Apartments">
            </div>
            
            <div class="form-group">
                <label for="address">Address *</label>
                <input type="text" id="address" required placeholder="e.g., 123 Main Street">
            </div>
            
            <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" required placeholder="e.g., Mumbai">
            </div>
            
            <div class="form-group">
                <label for="state">State *</label>
                <input type="text" id="state" required placeholder="e.g., Maharashtra">
            </div>
            
            <div class="form-group">
                <label for="pincode">Pincode *</label>
                <input type="text" id="pincode" required placeholder="e.g., 400001" pattern="[0-9]{6}">
            </div>
            
            <div class="form-group">
                <label for="totalBlocks">Total Blocks</label>
                <input type="number" id="totalBlocks" min="1" placeholder="e.g., 5">
            </div>
            
            <div class="form-group">
                <label for="totalFlats">Total Flats</label>
                <input type="number" id="totalFlats" min="1" placeholder="e.g., 100">
            </div>
            
            <button type="submit">Register Society</button>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const form = document.getElementById('societyForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const societyData = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value,
                totalBlocks: parseInt(document.getElementById('totalBlocks').value) || null,
                totalFlats: parseInt(document.getElementById('totalFlats').value) || null
            };

            try {
                const response = await fetch('http://localhost:8080/api/society/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(societyData)
                });

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'result success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <h3>✅ Society Registered Successfully!</h3>
                        <p><strong>Society ID:</strong> ${data.id}</p>
                        <p><strong>Name:</strong> ${data.name}</p>
                        <div class="code-box">
                            <div class="code-label">🔑 Registration Code (Share this with members):</div>
                            <div class="code-value">${data.registrationCode}</div>
                        </div>
                        <p style="margin-top:15px;"><small>Members will need this code to join your society.</small></p>
                    `;
                    form.reset();
                } else {
                    throw new Error('Registration failed');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <h3>❌ Registration Failed</h3>
                    <p>Error: ${error.message}</p>
                    <p>Please check the form and try again.</p>
                `;
            }
        });
    </script>
</body>
</html>
