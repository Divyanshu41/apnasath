<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick User Registration - ApnaSath</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 5px;
        }
        
        .info-box strong {
            color: #1976D2;
            display: block;
            margin-bottom: 8px;
        }
        
        .info-box p {
            color: #555;
            font-size: 14px;
            margin: 5px 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        #logs {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        
        #logs.show {
            display: block;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
        }
        
        .log-entry.info {
            color: #2196F3;
        }
        
        .log-entry.success {
            color: #4CAF50;
        }
        
        .log-entry.error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Quick User Registration</h1>
        <p class="subtitle">Register your user account</p>
        
        <div class="info-box">
            <strong>ℹ️ Important Information:</strong>
            <p>Society Code (from setup): <strong id="displayCode">SOC619931</strong></p>
            <p>This code was generated when you registered your society.</p>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="name">👤 Full Name *</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="email">📧 Email *</label>
                <input type="email" id="email" placeholder="your.email@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">📱 Phone Number *</label>
                <input type="tel" id="phone" placeholder="9876543210" required pattern="[0-9]{10,15}">
            </div>
            
            <div class="form-group">
                <label for="flatNumber">🏠 Flat Number *</label>
                <input type="text" id="flatNumber" placeholder="e.g., A-101" required>
            </div>
            
            <div class="form-group">
                <label for="societyCode">🔑 Society Code *</label>
                <input type="text" id="societyCode" value="SOC619931" required>
            </div>
            
            <div class="form-group">
                <label for="password">🔒 Password *</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            
            <button type="submit" id="submitBtn">Register User</button>
        </form>
        
        <div id="logs"></div>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            logsDiv.classList.add('show');
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert ${type} show`;
            
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                flatNumber: document.getElementById('flatNumber').value.trim(),
                societyCode: document.getElementById('societyCode').value.trim()
            };
            
            log('📤 Sending registration request...', 'info');
            log(`Data: ${JSON.stringify(formData, null, 2)}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                log(`📥 Response Status: ${response.status}`, 'info');
                
                const data = await response.json();
                log(`Response Data: ${JSON.stringify(data, null, 2)}`, 'info');
                
                if (response.ok) {
                    log('✅ User registered successfully!', 'success');
                    showAlert('✅ User registered successfully! You can now login.', 'success');
                    
                    // Save token
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        log('🔑 Token saved to localStorage', 'success');
                    }
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    document.getElementById('societyCode').value = 'SOC619931';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    const errorMsg = data.message || 'Registration failed';
                    log(`❌ Error: ${errorMsg}`, 'error');
                    showAlert(`❌ ${errorMsg}`, 'error');
                }
            } catch (error) {
                log(`❌ Network Error: ${error.message}`, 'error');
                showAlert(`❌ Error: ${error.message}`, 'error');
                console.error('Registration error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register User';
            }
        });
        
        // Load society code from localStorage if available
        window.addEventListener('DOMContentLoaded', () => {
            const savedCode = localStorage.getItem('society_code');
            if (savedCode) {
                document.getElementById('societyCode').value = savedCode;
                document.getElementById('displayCode').textContent = savedCode;
            }
            log('🎯 Form ready! Fill details and submit.', 'info');
        });
    </script>
</body>
</html>
